name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma Client は postinstall で生成されるが、Lockfile変更時等に備えて明示
      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: ESLint
        run: pnpm lint

      - name: TypeScript typecheck
        run: pnpm tsc --noEmit

      - name: Vitest
        run: pnpm test
